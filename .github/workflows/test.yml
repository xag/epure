# Two jobs, and the split is deliberate.
#
# `open-ready` needs nothing: no dependencies, no credentials, no network, no install step. It
# is the gate from #7 — nothing personal, no consumers named, in the tree AND in the history —
# and it must be green from the first commit and stay that way. So it is wired to depend on
# nothing that could turn it red for an unrelated reason: a gate that goes red for reasons
# other than the thing it guards is a gate people learn to ignore.
#
# `test` needs the estate: `uv sync` fetches `bom` and `flight-recorder` from git, and
# `epure.check` consumes `ledger@0.1.0` from the sibling registry checkout. While those repos
# are private, this job needs a read credential — the same constraint bom-registry's own
# workflow already records ("full validate_package CI needs bom installable here — deferred
# while bom is a private repo"). Set `ESTATE_READ_TOKEN` (a read-only, contents-scoped
# fine-grained PAT over the estate) and it runs today. When the open repos flip public, the
# secret stops being needed and this keeps working with the default token: nothing here has
# to change at launch, which is the point of writing it this way now rather than later.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  open-ready:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # --history reads every commit's diff, so it needs every commit
      - run: python tools/open_ready.py --history

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: epure
          token: ${{ secrets.ESTATE_READ_TOKEN || github.token }}

      # The registry, as a sibling — the same layout as a developer's machine, so
      # `epure.check`'s default (`../bom-registry`) is the path in CI too and there is no
      # CI-only configuration to drift out of step with the real one.
      - uses: actions/checkout@v4
        with:
          repository: xag/bom-registry
          path: bom-registry
          token: ${{ secrets.ESTATE_READ_TOKEN || github.token }}

      # uv fetches `bom` and `flight-recorder` over https. A token in the git config is how
      # it reaches them while they are private; harmless, and unused, once they are not.
      - if: ${{ secrets.ESTATE_READ_TOKEN != '' }}
        run: git config --global url."https://x-access-token:${{ secrets.ESTATE_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}

      - run: uv sync
        working-directory: epure

      - run: uv run pytest -q
        working-directory: epure

      # The ledger is a gate, not a report: exit 1 while any rule is red. A decision that
      # names no rejected alternative, a belief nothing could kill, a debt with no discharge —
      # each stops the merge, and none of them can be discharged by editing the ledger.
      - run: uv run python -m epure.check
        working-directory: epure
