# Two jobs, and the split is deliberate.
#
# `open-ready` needs nothing: no dependencies, no credentials, no network, no install step. It
# is the gate from #7 — nothing personal, no consumers named, in the tree AND in the history —
# and it must be green from the first commit and stay that way. So it is wired to depend on
# nothing that could turn it red for an unrelated reason: a gate that goes red for reasons
# other than the thing it guards is a gate people learn to ignore.
#
# `test` needed the estate when quern and flight-recorder were private and the vocabulary came
# from a sibling registry checkout. Both conditions are gone: those repos are public, and the
# pinned packages are committed under .quern/library. ESTATE_READ_TOKEN is still honoured where
# it is set (uv's git fetches), and nothing here requires it — which is what the original note
# promised would happen at launch, arriving one failure late.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  open-ready:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # --history reads every commit's diff, so it needs every commit
      - run: python3 tools/open_ready.py --history

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    # The `secrets` context is not available in a step's `if`, so the token comes through
    # `env`, where it is — and where an unset secret is the empty string rather than an error.
    env:
      ESTATE_READ_TOKEN: ${{ secrets.ESTATE_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: epure
          token: ${{ secrets.ESTATE_READ_TOKEN || github.token }}

      # NO REGISTRY CHECKOUT. It used to clone xag/quern-registry as a sibling, matching a
      # developer's layout — and that registry is frozen at ledger@0.4.1, so from the repin
      # onward every run failed with "ledger@0.5.0 (pinned) is not in the library". The pinned
      # packages are committed under .quern/library now, so the layout that matters is the one
      # inside the repo: consume() falls back to the cache when no registry is reachable, which
      # is also what a developer gets on a laptop with no sibling checkout.

      # uv fetches `quern` and `flight-recorder` over https. A token in the git config is how
      # it reaches them while they are private; harmless, and unused, once they are not.
      - if: env.ESTATE_READ_TOKEN != ''
        run: git config --global url."https://x-access-token:${ESTATE_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
        shell: bash

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}

      - run: uv sync
        working-directory: epure

      - run: uv run pytest -q
        working-directory: epure

      # The ledger is a gate, not a report: exit 1 while any rule is red. A decision that
      # names no rejected alternative, a belief nothing could kill, a debt with no discharge —
      # each stops the merge, and none of them can be discharged by editing the ledger.
      - run: uv run python -m epure.check
        working-directory: epure
